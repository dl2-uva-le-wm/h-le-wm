defaults:
  - _self_

cache_dir: null

world:
  env_name: swm/TwoRoom-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget
  history_size: 1
  frame_skip: 1

seed: 42
policy: hi_lewm

planning:
  mode: hierarchical # one of: hierarchical, flat
  high:
    replan_interval: 5
    solver:
      _target_: stable_worldmodel.solver.CEMSolver
      model: ???
      batch_size: 1
      num_samples: 300
      var_scale: 1.0
      n_steps: 20
      topk: 10
      device: "cuda"
      seed: ${seed}
    plan_config:
      horizon: 2
      receding_horizon: 1
      action_block: 1
    latent_prior:
      enabled: True
      num_chunks: 2048
      min_chunks_for_stats: 64
      chunk_len: 5
      lower_q: 5.0
      upper_q: 95.0
      margin_ratio: 0.05
      clamp_abs: 3.0
      fallback_abs: 1.0
  low:
    solver:
      _target_: stable_worldmodel.solver.CEMSolver
      model: ???
      batch_size: 1
      num_samples: 300
      var_scale: 1.0
      n_steps: 30
      topk: 10
      device: "cuda"
      seed: ${seed}
    plan_config:
      horizon: 5
      receding_horizon: 1
      action_block: 5

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio

solver:
  _target_: stable_worldmodel.solver.CEMSolver
  model: ???
  batch_size: 1
  num_samples: 300
  var_scale: 1.0
  n_steps: 30
  topk: 30
  device: "cuda"
  seed: ${seed}

plan_config:
  horizon: 1
  receding_horizon: 1
  action_block: 5

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: tworoom
  callables:
    - method: _set_state
      args:
        state:
          value: proprio
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_proprio

output:
  filename: hi_tworoom_results.txt
  subdir: null
