defaults:
  - _self_

cache_dir: null

world:
  env_name: swm/TwoRoom-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget
  history_size: 1
  frame_skip: 1

seed: 42
policy: hi_lewm

wm:
  num_levels: 3

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio

solver:
  _target_: stable_worldmodel.solver.CEMSolver
  model: ???
  batch_size: 1
  num_samples: 300
  var_scale: 1.0
  n_steps: 30
  topk: 30
  device: "cuda"
  seed: ${seed}

plan_config:
  horizon: 1
  receding_horizon: 1
  action_block: 5

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: tworoom
  callables:
    - method: _set_state
      args:
        state:
          value: proprio
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_proprio

output:
  filename: hi_tworoom_results.txt
